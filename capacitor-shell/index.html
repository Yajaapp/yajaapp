<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YAJA Conductor</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0f172a;
        color: white;
        font-family: system-ui, sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      .spinner {
        width: 44px;
        height: 44px;
        border-radius: 9999px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #10b981;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      p {
        margin: 0;
        color: rgba(255,255,255,0.72);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="loader">
      <div class="spinner"></div>
      <p>Abriendo YAJA Conductor...</p>
    </div>
  </body>
  </html>
